<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Practicum Project 2" />
    <meta name="author" content="Esteban Loza" />
    <title>Around the U.S.</title>
  </head>
  <body class="page">
    <div class="page__content">
      <header class="header page__section">
        <img
          class="header__logo"
          src="<%=require('./images/main_logo_white.svg')%>"
          alt="Around the U.S. Logo"
        />
      </header>
      <main class="content">
        <section class="profile page__section">
          <img
            src="<%=require('./images/profile pic.png')%>"
            alt="avatar"
            class="profile__image"
          />
          <div class="profile__info">
            <h1 class="profile__title">Esteban Loza</h1>
            <button
              class="profile__edit-button"
              id="profile-edit-button"
              type="button"
            ></button>
            <p class="profile__description">Software Engineer</p>
          </div>
          <button
            class="profile__add-button"
            id="add-button"
            type="button"
          ></button>
        </section>
        <section class="cards page__section">
          <ul class="cards__list"></ul>
        </section>
      </main>
      <footer class="footer page__section">
        <p class="footer__copyright">
          &copy; Esteban Loza 2023 Around The U.S.
        </p>
      </footer>
    </div>
    <!--Name and About Modal-->
    <div class="modal" id="profile-edit-modal">
      <div class="popup modal__container form">
        <button
          class="form__button-exit"
          type="button"
          id="form-exit-button"
        ></button>
        <fieldset class="form__fieldset">
          <h2 class="form__label">Edit profile</h2>
          <form class="form__block popup__form" id="modal-form" name="form">
            <input
              type="text"
              class="form__input popup__input"
              name="title"
              id="profile-title-input"
              placeholder="Name"
              required
              maxlength="40"
              minlength="2"
            />
            <span
              class="popup__error popup__error-name"
              id="profile-title-input-error"
            >
            </span>
            <input
              type="text"
              class="form__input popup__input"
              name="description"
              id="profile-description-input"
              placeholder="Description"
              required
              maxlength="200"
              minlength="2"
            />
            <span
              class="popup__error popup__error-about"
              id="profile-description-input-error"
            >
            </span>
            <button class="form__button-submit" type="submit">Save</button>
          </form>
        </fieldset>
      </div>
    </div>

    <div class="modal" id="cards-edit-modal">
      <div class="modal__container form popup">
        <button
          class="form__button-exit"
          type="button"
          id="card-exit-button"
        ></button>
        <div class="form__fieldset">
          <h2 class="form__label">New Place</h2>
          <form
            class="form__block popup__form"
            id="modal-card-form"
            name="form"
          >
            <input
              type="text"
              class="form__input popup__input modal__input modal__input_type_title"
              name="title"
              id="card-title-input"
              placeholder="Title"
              required
              minlength="1"
              maxlength="30"
            />
            <span
              class="popup__error popup__error-name"
              id="card-title-input-error"
            >
            </span>
            <input
              type="url"
              class="form__input popup__input modal__input modal__input_type_url"
              name="link"
              id="card-description-input"
              placeholder="Image Link"
              required
            />
            <span
              class="popup__error popup__error-about"
              id="card-description-input-error"
            >
            </span>
            <button
              class="form__button-submit popup__button"
              type="submit"
              id="addCardSubmitButton"
              disabled
            >
              Save
            </button>
          </form>
        </div>
      </div>
    </div>
    <!--Image Modal-->
    <div class="modal" id="preview-modal">
      <div class="modal__container form modal__container_type_preview">
        <button
          class="form__button-exit"
          type="button"
          id="preview-exit-button"
        ></button>
        <img src="#" alt="#" class="modal__preview-image" />
        <h3 class="modal__label"></h3>
      </div>
    </div>

    <template id="card-template">
      <li class="card">
        <img src="" alt="" class="card__image" />
        <button class="card__delete-button" type="button"></button>
        <div class="card__description">
          <h2 class="card__title"></h2>
          <button class="card__like-button" type="button"></button>
        </div>
      </li>
    </template>
  </body>
</html>
